name: Crowdin Upload

# Pushes the English source catalog to Crowdin whenever it changes on master.
# Read-only against the repo: it can only upload sources, never write back here.

on:
  push:
    branches: [master]
    paths:
      - src/locales/en.po
      - crowdin.yml
  # Temporary: dry-run the upload on PRs to master so the workflow can be
  # exercised before merge. Remove this pull_request trigger once verified.
  pull_request:
    branches: [master]
    paths:
      - src/locales/en.po
      - crowdin.yml
      - .github/workflows/crowdin-upload.yml

permissions:
  contents: read

concurrency:
  group: crowdin-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2.16.2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          dryrun_action: ${{ github.event_name == 'pull_request' }}
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
