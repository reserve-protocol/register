name: Crowdin Download

# Pulls completed translations from Crowdin and opens a PR against master.
# It NEVER merges. The hard "cannot reach master without a human" guarantee
# comes from branch protection (required approval + "Actions can't approve PRs"),
# not from this workflow. The PR should touch only src/locales/*.po.

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  # Temporary: run on PRs to master so the download can be exercised before
  # merge. It will open the l10n_master -> master PR. Remove once verified.
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/crowdin-download.yml
      - crowdin.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-download
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download translations from Crowdin
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2.16.2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n_master
          create_pull_request: true
          pull_request_base_branch_name: master
          pull_request_title: 'chore(i18n): update translations'
          pull_request_body: 'Automated translation update from Crowdin. Verify the file list touches only src/locales/*.po before approving.'
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
