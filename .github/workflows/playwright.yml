name: E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Nightly full suite at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (app + e2e)
        run: pnpm typecheck
      - name: Snapshot manifest and freshness
        run: pnpm e2e:check
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke suite
        run: pnpm e2e:smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14

  full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck (app + e2e)
        run: pnpm typecheck
      - name: Snapshot manifest and freshness
        run: pnpm e2e:check
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Full suite
        run: pnpm e2e:full
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-report
          path: playwright-report/
          retention-days: 30
